NWBFile:
  keywords:
    - decision making
    - context-dependent behavior
  related_publications:
    - doi:10.1038/s41586-024-08433-6
  experiment_description: |
    In this study rats were trained to perform a task requiring context-dependent selection
    and accumulation of sensory evidence. The task was performed in a behavioural box consisting of three
    straight walls and one curved wall with three nose ports. Each nose port was equipped with an LED to
    deliver visual stimuli, and with an infrared beam to detect the rat's nose when entering the port.
    In addition, above the two side ports there were speakers to deliver sound stimuli, and water cannulas
    to deliver a water reward. At the beginning of each trial, rats were presented with an audiovisual cue
    indicating the context of the current trial, either prevalent location (LOC) context or prevalent frequency (FRQ) context. The context cues consisted
    of 1-s-long, clearly distinguishable frequency modulated sounds, and in addition the LOC context was
    signalled by turning on the LEDs of all three ports, whereas in the FRQ context only the centre LED
    was turned on. After the end of the context cue, the rats were required to place their nose into the
    centre port. While maintaining fixation in the centre port, rats were presented with a 1.3-s-long train
    of randomly timed auditory pulses. Each pulse was played either from the speaker to the rat's left
    or from the speaker to their right, and each pulse a 5-ms pure tone with either low frequency (6.5 kHz)
    or high frequency (14 kHz). The pulse trains were generated by Poisson processes with different underlying
    rates. The strength of the location evidence was manipulated by varying the relative rate of right versus
    left pulses, and the strength of the frequency evidence was manipulated by varying the relative rate of
    high versus low pulses. The overall pulse rate was kept constant at 40 Hz. In the LOC context, rats were
    rewarded if they turned, at the end of the stimulus, towards the side that had played the greater total
    number of pulses, ignoring the frequency of the pulses. In blocks of frequency trials, rats were rewarded
    for orienting left if the total number of low-frequency pulses was higher than the total number of
    high-frequency pulses, and orienting right otherwise, ignoring the location of the pulses. The context
    was kept constant in blocks of trials, and block switches occurred after a minimum of 30 trials per block,
    and when a local estimate of performance reached a threshold of 80% correct.
  session_description: |
    This session contains behavioral data from a rat performing a context-dependent decision-making task.
    The task required the animal to accumulate sensory evidence over time and select an action based on the context
    cue for that trial. This dataset includes event timings, trial structure, stimulus parameters, and subject responses.
  institution: University of Edinburgh
  lab: Pagan
  experimenter:
    - Pagan, Marino
    - Tang, Vincent D.

Subject:
  species: Rattus norvegicus
  description: Long-Evans rat, wild-type.
  strain: Long Evans
  # sex and date_of_birth are set per-subject from rat_information.xlsx in convert_session.py

Session:
  timezone: Europe/London

# ── Behavior tables (ndx-structured-behavior) ─────────────────────────────────
Behavior:
  Device:
    name: BControl
    manufacturer: Brody Lab, Princeton University
  StateTypesTable:
    description: Contains the name of the states in the task.
  StatesTable:
    description: Contains the start and stop times of each state in the task.
  EventTypesTable:
    description: Contains the name of the events in the task.
  EventsTable:
    description: Contains the start and stop times of each active event (e.g. poke) in the task.
  ActionTypesTable:
    description: Contains the name of the actions in the task.
  ActionsTable:
    description: Contains the onset times of the task output actions.
  TaskArgumentsTable:
    description: Contains the task arguments for the task.
  TrialsTable:
    description: Contains the start and stop times of each trial in the task.
    # Ragged pulse-time columns: times relative to cpoke onset, one list per trial.
    # Add cpoke_start_time to convert to absolute session time.
    pulse_columns:
      cpoke_start_time: >-
        Absolute time (seconds from session start) when the rat entered the centre port
        (cpoke onset). NaN for trials where the rat did not poke (error/invalid trials).
        Used to convert relative pulse timestamps in left_hi/right_hi/left_lo/right_lo
        to absolute times.
      left_hi: >-
        Times of left-speaker, high-frequency pulses in seconds relative to cpoke onset
        (centre-port entry). Add cpoke_start_time to convert to absolute session time.
        Empty when no pulses of this type were generated.
      right_hi: >-
        Times of right-speaker, high-frequency pulses in seconds relative to cpoke onset.
        Add cpoke_start_time to convert to absolute session time.
      left_lo: >-
        Times of left-speaker, low-frequency pulses in seconds relative to cpoke onset.
        Add cpoke_start_time to convert to absolute session time.
      right_lo: >-
        Times of right-speaker, low-frequency pulses in seconds relative to cpoke onset.
        Add cpoke_start_time to convert to absolute session time.
    columns:
      - name: crosstalk_dir
        description: The ratio to which the pulse is played from the left or right speaker. A value of 1 means the pulse is played only from the right side, and a value of 0 means the pulse is played equally from both speakers.
      - name: crosstalk_freq
        description: The ratio to which the pulses are being modulated in frequency.
      - name: bup_width
        description: The duration of a single pulse in milliseconds.
      - name: bup_ramp
        description: The duration of the ramp of a single pulse in milliseconds.
      - name: vol_low
        description: The multiplier of the volume of the low frequency tone.
      - name: vol_hi
        description: The multiplier of the volume of the high frequency tone.
      - name: vol
        description: The overall volume multiplier of the sound stimulus.
      - name: gamma_dir
        description: Log ratio of average right vs. left pulse rates per second; zero means equal, positive means more pulses come from the right speaker, negative means more left.
      - name: gamma_freq
        description: Log ratio of average high vs. low frequency pulses per second; zero means equal, positive means more high frequency pulses, negative means more low frequency pulses.
      - name: duration
        description: The duration of the sound stimulus in seconds.
      - name: freq_lo
        description: The frequency of the low frequency pulse in Herz.
      - name: freq_hi
        description: The frequency of the high frequency pulse in Herz.

# ── Optogenetics ──────────────────────────────────────────────────────────────
# All optogenetics hardware specs, surgical coordinates, and stimulation parameters.
# Source: Pagan et al. 2025 (doi:10.1038/s41586-024-08433-6), Methods section.
Optogenetics:
  # Cerebro internal unit → watts conversion.
  # raw unit >= cerebro_threshold means laser was on at power_in_W (25 mW).
  power_calibration:
    cerebro_threshold: 800
    power_in_W: 0.025
    power_in_mW: 25.0

  # Stimulation window offsets (seconds) relative to cpoke start, keyed by opto_type string.
  stimulation_windows:
    Full Trial: [0.0, 1.3]
    First Half: [0.0, 0.65]
    Second Half: [0.65, 1.3]

  excitation_source_model:
    name: cerebro_model
    source_type: Solid-State Laser
    excitation_mode: one-photon
    manufacturer: Karpova Lab
    wavelength_range_in_nm: [473.0, 473.0]
    description: >-
      Cerebro wireless optogenetic stimulation system model.
      See https://karpova-lab.github.io/cerebro/

  excitation_source:
    name: Cerebro
    manufacturer: Karpova Lab
    power_in_W: 0.025
    description: >-
      Wireless optogenetic stimulation system (Karpova Lab).
      See https://karpova-lab.github.io/cerebro/

  laser_device:
    name: Cerebro_laser
    manufacturer: Karpova Lab
    description: >-
      473 nm solid-state laser in the Cerebro wireless optogenetic stimulation system
      (Karpova Lab). Power calibrated to 25 mW at fibre tip.

  optical_fiber_model:
    name: fof_fiber_model
    numerical_aperture: 0.37
    core_diameter_in_um: 400.0
    manufacturer: Newport
    description: 0.37 NA, 400 µm core optical fiber (Newport) for FOF optogenetic stimulation.

  optical_fibers:
    left:
      name: optical_fiber_left
      description: Optical fiber implanted in the left hemisphere FOF (+2 mm AP, -1.3 mm ML from bregma).
      insertion_position_ap_in_mm: 2.0
      insertion_position_ml_in_mm: -1.3
    right:
      name: optical_fiber_right
      description: Optical fiber implanted in the right hemisphere FOF (+2 mm AP, +1.3 mm ML from bregma).
      insertion_position_ap_in_mm: 2.0
      insertion_position_ml_in_mm: 1.3

  effector:
    name: ChR2
    label: ChR2
    description: Channelrhodopsin-2 opsin expressed via AAV2/5-mDlx-ChR2-mCherry in interneurons.

  viral_vector:
    name: aav_mdlx_chr2_mcherry
    construct_name: AAV2/5-mDlx-ChR2-mCherry
    manufacturer: unknown
    description: AAV2/5-mDlx-ChR2-mCherry used for interneuron-specific ChR2 expression in FOF.

  # Injection protocol: 9.2 nL every 100 µm over 1.5 mm across 5 tracts; 1.5 µL total/hemisphere.
  injections:
    left:
      name: injection_fof_left
      location: Frontal Orienting Field (FOF)
      hemisphere: left
      reference: Bregma at the cortical surface
      ap_in_mm: 2.0
      ml_in_mm: -1.3
      volume_in_uL: 1.5
      description: >-
        Left FOF injection of AAV2/5-mDlx-ChR2-mCherry.
        Protocol: 9.2 nL every 100 µm over 1.5 mm across 5 tracts; 1.5 µL total.
    right:
      name: injection_fof_right
      location: Frontal Orienting Field (FOF)
      hemisphere: right
      reference: Bregma at the cortical surface
      ap_in_mm: 2.0
      ml_in_mm: 1.3
      volume_in_uL: 1.5
      description: >-
        Right FOF injection of AAV2/5-mDlx-ChR2-mCherry.
        Protocol: 9.2 nL every 100 µm over 1.5 mm across 5 tracts; 1.5 µL total.

  sites_table:
    name: optogenetic_sites_table
    description: >-
      Optogenetic stimulation sites in the Frontal Orienting Field (FOF) bilaterally.
      Coordinates are relative to Bregma at the cortical surface.

  epochs_table:
    name: optogenetic_epochs
    description: >-
      Per-trial optogenetic stimulation intervals in the Frontal Orienting Field (FOF).
      Stimulation is continuous (single pulse) within a window anchored to cpoke onset.
      Window type: 'Full Trial' = 0–1.3 s, 'First Half' = 0–0.65 s,
      'Second Half' = 0.65–1.3 s relative to cpoke.

  stimulation:
    software: BControl / Cerebro
    wavelength_in_nm: 473.0
    number_pulses_per_pulse_train: 1
    number_trains: 1

  stimulus_sites:
    left:
      name: opto_site_left
      description: Optical fiber in the left hemisphere FOF, +2 mm AP, -1.3 mm ML from bregma.
      excitation_lambda: 473.0
      location: Frontal Orienting Field (FOF), left hemisphere
    right:
      name: opto_site_right
      description: Optical fiber in the right hemisphere FOF, +2 mm AP, +1.3 mm ML from bregma.
      excitation_lambda: 473.0
      location: Frontal Orienting Field (FOF), right hemisphere

  series:
    comments: >-
      Power values are in watts. Conversion rule: raw Cerebro internal unit >= 800 →
      25 mW (0.025 W); otherwise laser was off → 0 W. The Cerebro threshold of 800
      corresponds to the experimenters' calibrated 25 mW output. Raw per-trial values
      are preserved in the trials table columns OptoSection_opto_left_power /
      OptoSection_opto_right_power.
    description_template: >-
      Laser power (watts) delivered to the {side} hemisphere FOF as a step function.
      Each stimulation interval is represented by an onset sample (0.025 W = 25 mW)
      immediately followed by an offset sample (0 W).

  trials_columns:
    opto_connected:
      description: >-
        Whether the wireless optogenetics system (Cerebro) was connected for this trial
        (1 = connected, 0 = not connected).
    opto_type:
      description: >-
        Stimulation window type relative to cpoke onset: 'Full Trial' (0–1.3 s),
        'First Half' (0–0.65 s), or 'Second Half' (0.65–1.3 s).
