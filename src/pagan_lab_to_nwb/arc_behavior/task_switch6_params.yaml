HistorySection:
  correct_coherent:
    description: Fraction of correct responses on coherent trials (location and frequency
      evidence consistent), computed as a running average over the session.
  correct_incoherent:
    description: Fraction of correct responses on incoherent trials (location and
      frequency evidence conflict), computed as a running average over the session.
  left_correct:
    description: Fraction of correct responses on trials where the correct side was
      left, computed as a running average over the session.
  right_correct:
    description: Fraction of correct responses on trials where the correct side was
      right, computed as a running average over the session.
  dir_correct:
    description: Fraction of correct responses on Direction (LOC) context trials,
      computed as a running average over the session.
  freq_correct:
    description: Fraction of correct responses on Frequency (FRQ) context trials,
      computed as a running average over the session.
  total_correct:
    description: Overall fraction of correct responses (excluding violation trials),
      computed as a running average over the session.
  percent_violations:
    description: Fraction of trials that were nose-in-center (NIC) violations, computed
      as a running average over the session.
  result_history:
    description: "Trial outcome code for each trial in the session. Values: 1 = correct\
      \ (hit_state reached); 2 = error (error_state reached); 3 = nose-in-center\
      \ (NIC) violation; 4 = timeout violation; 5 = error-then-correct (wrong side\
      \ chosen first, then correct side in forgiveness mode); 6 = error-then-error\
      \ (wrong side chosen twice in forgiveness mode)."
  hit_history:
    description: "Binary trial outcome per trial, ignoring violations. Values: 1 =\
      \ correct (result=1); 0 = error or error-forgiveness trial (result=2, 5, or\
      \ 6); NaN = violation trial (NIC or timeout, result=3 or 4). Used to compute\
      \ performance metrics such as total_correct, left_correct, dir_correct."
  side_history:
    description: "Stimulus-determined correct response side for each trial. Values:\
      \ 'l' = correct side was left; 'r' = correct side was right. This reflects\
      \ which side had the greater total number of pulses in the LOC context, or which\
      \ frequency dominated in the FRQ context."
  task_history:
    description: "Task context for each trial. Values: 'd' = Direction/LOC (location)\
      \ context, rat must respond based on which side received more pulses; 'f' =\
      \ Frequency/FRQ context, rat must respond based on which frequency (high/low)\
      \ dominated. Context alternates in blocks of at least 30 trials."
  incoh_history:
    description: "Whether each trial was incoherent (1) or coherent (0). Coherent\
      \ trials (0): location and frequency evidence are consistent (e.g., more right-side\
      \ pulses and more high-frequency pulses simultaneously). Incoherent trials (1):\
      \ location and frequency evidence conflict. These trials test the rat's ability\
      \ to ignore the irrelevant stimulus feature."
  gammadir_history:
    description: Signed strength of the location (direction) evidence for each trial
      (ThisGamma_dir). Positive values indicate more right-side pulses (go-right evidence);
      negative values indicate more left-side pulses (go-left evidence). The magnitude
      reflects the difference in right-vs-left pulse rates. In the LOC context this
      is the relevant evidence; in the FRQ context it is irrelevant.
  gammafreq_history:
    description: Signed strength of the frequency evidence for each trial (ThisGamma_freq).
      Positive values indicate more high-frequency pulses; negative values indicate
      more low-frequency pulses. The magnitude reflects the difference in high-vs-low
      pulse rates. In the FRQ context this is the relevant evidence; in the LOC context
      it is irrelevant.
  hit_history_task:
    description: "Binary trial outcomes within the current task block, reset at each\
      \ context switch. Values: 1 = correct; 0 = error; NaN = violation. Used to\
      \ compute exponentially weighted running performance within the current block\
      \ (total_correct_task), which drives automatic context switching."
  incoh_history_task:
    description: "Whether each trial in the current task block was incoherent (1)\
      \ or coherent (0), NaN for violations. Resets at each context switch. Used\
      \ to compute block-level performance separately for coherent and incoherent\
      \ trials (total_correct_coherent_task, total_correct_incoherent_task)."
  quadrant_history:
    description: "Stimulus quadrant for each trial, encoding the combination of direction\
      \ and frequency evidence signs. The quadrant is determined by the signs of\
      \ ThisGamma_dir and ThisGamma_freq: quadrant 1 = right/high, 2 = left/high,\
      \ 3 = left/low, 4 = right/low. Coherent trials have quadrant 1 or 3; incoherent\
      \ trials have quadrant 2 or 4 (evidence signs conflict)."
  left_laser_history:
    description: "Per-trial record of left-hemisphere laser stimulation state. Values:\
      \ 1 = laser was on for this trial (left hemisphere stimulated); 0 = laser off.\
      \ ⚠️ Needs lab confirmation — exact encoding (on/off vs power level) not verified."
  right_laser_history:
    description: "Per-trial record of right-hemisphere laser stimulation state. Values:\
      \ 1 = laser was on for this trial (right hemisphere stimulated); 0 = laser\
      \ off. ⚠️ Needs lab confirmation — exact encoding (on/off vs power level) not verified."
